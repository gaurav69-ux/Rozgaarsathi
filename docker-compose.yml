services:
  server:
    image: ${DOCKERHUB_USERNAME}/rozgaarsathi-server:${IMAGE_TAG:-latest}
    container_name: rozgaarsathi-server
    restart: always
    environment:
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3000:3000"
    networks:
      - rozgaarsathi-network

  client:
    image: ${DOCKERHUB_USERNAME}/rozgaarsathi-client:${IMAGE_TAG:-latest}
    container_name: rozgaarsathi-client
    restart: always
    depends_on:
      - server
    networks:
      - rozgaarsathi-network

  nginx:
    image: nginx:alpine
    container_name: rozgaarsathi-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server
    networks:
      - rozgaarsathi-network

networks:
  rozgaarsathi-network:
    driver: bridge