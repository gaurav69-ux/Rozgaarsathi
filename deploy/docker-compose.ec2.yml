services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/rozgaarsathi-backend:${IMAGE_TAG:-latest}
    container_name: rozgaarsathi-backend
    restart: always
    environment:
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "3000:3000"
    networks:
      - rozgaarsathi-network

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/rozgaarsathi-frontend:${IMAGE_TAG:-latest}
    container_name: rozgaarsathi-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - rozgaarsathi-network

  nginx:
    image: nginx:alpine
    container_name: rozgaarsathi-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - rozgaarsathi-network

networks:
  rozgaarsathi-network:
    driver: bridge