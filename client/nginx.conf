worker_processes 1;

events { 
    worker_connections 1024; 
}

http {
    include /etc/nginx/mime.types;
    sendfile on;

    server {
        listen 80;
        # Optional: Replace localhost with your EC2 Public IP or Domain
        server_name localhost; 

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri /index.html;
        }

        # ADD THIS: Proxy API requests to your Node.js server container
        location /api/ {
            proxy_pass http://server:3000/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ADD THIS: Proxy requests for uploaded files (like profile pictures)
        location /uploads/ {
            proxy_pass http://server:3000/uploads/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
